<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f0c1a"/>
  <rect x="0" y="0" width="7" height="630" fill="#7c3aed"/>

  <!-- subtle grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1e1535" stroke-width="1.5"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1e1535" stroke-width="1.5"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1e1535" stroke-width="1.5"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1e1535" stroke-width="1.5"/>

  <!-- badge -->
  <rect x="80" y="90" width="200" height="38" rx="6" fill="#2a1f4a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="180" y="115" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#a78bfa" text-anchor="middle" letter-spacing="3">LLM TOP 10</text>

  <!-- main title -->
  <text x="80" y="210" font-family="'IBM Plex Sans',sans-serif" font-size="72" font-weight="600" fill="#ffffff">Learn the</text>
  <text x="80" y="296" font-family="'IBM Plex Sans',sans-serif" font-size="72" font-weight="600" fill="#a78bfa">LLM Top 10</text>
  <text x="80" y="382" font-family="'IBM Plex Sans',sans-serif" font-size="72" font-weight="600" fill="#ffffff">by doing it.</text>

  <!-- subtitle -->
  <text x="80" y="434" font-family="'IBM Plex Sans',sans-serif" font-size="24" fill="#6b7280">Interactive slide-by-slide security course — no fluff, real scenarios, real mitigations.</text>

  <!-- stat pills -->
  <rect x="80" y="472" width="150" height="48" rx="8" fill="#1e1535" stroke="#3b2d6e" stroke-width="1.5"/>
  <text x="155" y="502" font-family="'IBM Plex Mono',monospace" font-size="20" fill="#a78bfa" text-anchor="middle">10 modules</text>

  <rect x="248" y="472" width="148" height="48" rx="8" fill="#1e1535" stroke="#3b2d6e" stroke-width="1.5"/>
  <text x="322" y="502" font-family="'IBM Plex Mono',monospace" font-size="20" fill="#a78bfa" text-anchor="middle">303 slides</text>

  <rect x="414" y="472" width="148" height="48" rx="8" fill="#1e1535" stroke="#3b2d6e" stroke-width="1.5"/>
  <text x="488" y="502" font-family="'IBM Plex Mono',monospace" font-size="20" fill="#a78bfa" text-anchor="middle">10 quizzes</text>

  <!-- domain bottom right -->
  <text x="1120" y="578" font-family="'IBM Plex Mono',monospace" font-size="22" fill="#4b3f8a" text-anchor="end">evlbot.xyz</text>

  <!-- decorative lock shape (right side) -->
  <g opacity="0.15">
    <rect x="880" y="100" width="260" height="380" rx="20" fill="#7c3aed"/>
    <rect x="930" y="240" width="160" height="140" rx="14" fill="#0f0c1a"/>
    <rect x="975" y="170" width="70" height="84" rx="35" fill="none" stroke="#0f0c1a" stroke-width="22"/>
    <rect x="1001" y="294" width="18" height="36" rx="6" fill="#7c3aed"/>
